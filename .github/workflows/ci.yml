name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run typecheck
      - run: bun run test
      - name: Scenario lint
        run: bun src/lint.ts
      - name: Tier 1 benchmark run (naive adapter)
        run: bun src/cli.ts --adapter naive
